[pytest]

markers =
    smoke: smoke suite
    regression: regression suite
    api: api tests
    ui: ui tests
    e2e: end-to-end tests

addopts =
    -v
    -n auto
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure
    --alluredir=reports/allure-results